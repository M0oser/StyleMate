<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StyleMate - AI Stylist</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { fashion: '#111111' }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.4s ease forwards; }

        .glass-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            filter: grayscale(100%);
        }
        .glass-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="text-fashion font-sans antialiased pb-24 selection:bg-fashion selection:text-white">

    <div class="glass-bg"></div>
    <div class="glass-overlay"></div>

    <header class="sticky top-0 z-40 bg-white/60 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-white/50">
        <h1 class="text-xl font-bold tracking-tighter uppercase">StyleMate.</h1>
        <div class="w-8 h-8 bg-white/80 shadow-sm rounded-full flex items-center justify-center text-sm">✨</div>
    </header>

    <main id="tab-outfit" class="tab-content active px-5 py-4">
        <div class="mb-8">
            <h2 class="text-3xl font-bold tracking-tight mb-2">Твой стиль</h2>
            <p class="text-gray-600 text-sm font-medium">Выбери повод, ИИ сделает остальное.</p>
        </div>

        <form id="outfit-form" class="space-y-6 mb-8">
            <div class="flex overflow-x-auto gap-3 no-scrollbar pb-2" id="chips-container">
                <button type="button" class="scenario-chip active-chip bg-fashion text-white px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-transform active:scale-95" data-value="Свидание">Свидание</button>
                <button type="button" class="scenario-chip bg-white/80 shadow-sm text-gray-600 px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-transform active:scale-95" data-value="Офис">В офис</button>
                <button type="button" class="scenario-chip bg-white/80 shadow-sm text-gray-600 px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-transform active:scale-95" data-value="Прогулка в дождь">Прогулка 🌧️</button>
                <button type="button" class="scenario-chip bg-white/80 shadow-sm text-gray-600 px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap transition-transform active:scale-95" data-value="custom">✍️ Свой вариант</button>
            </div>

            <input type="hidden" id="scenario" value="Свидание">

            <div id="custom-input-container" class="hidden transition-all">
                <input type="text" id="custom-scenario-text" placeholder="Например: Поход в горы с друзьями..." class="w-full bg-white/80 backdrop-blur shadow-sm border border-gray-200 text-fashion py-3.5 px-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-fashion">
            </div>

            <button id="submit-btn" type="submit" class="w-full bg-fashion text-white font-semibold text-sm uppercase tracking-wide py-4 rounded-2xl shadow-xl shadow-black/10 hover:bg-black active:scale-[0.98] transition-all">
                Сгенерировать образ
            </button>
        </form>

        <div id="skeleton-loader" class="hidden grid grid-cols-2 gap-4">
            <div class="animate-pulse"><div class="bg-white/50 aspect-[4/5] rounded-2xl mb-3"></div></div>
            <div class="animate-pulse delay-75"><div class="bg-white/50 aspect-[4/5] rounded-2xl mb-3"></div></div>
        </div>

        <div id="results-container" class="hidden">
            <!-- Сюда вставится объяснение ИИ и сетка с вещами -->
        </div>
    </main>

    <main id="tab-wardrobe" class="tab-content px-5 py-4">
        <!-- Контент гардероба будет загружен через JS -->
    </main>

    <main id="tab-favorites" class="tab-content px-5 py-4">
        <h2 class="text-3xl font-bold tracking-tight mb-2">Избранное</h2>
        <p class="text-gray-600 text-sm font-medium mb-8">Вещи, которые ты отметил ❤️</p>

        <div id="favorites-empty" class="text-center py-10">
            <p class="text-gray-500 text-sm">Ты еще ничего не добавил в избранное.</p>
        </div>
        <div id="favorites-grid" class="grid grid-cols-2 gap-x-4 gap-y-6 hidden">
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/80 backdrop-blur-xl border-t border-gray-100 pb-safe z-50">
        <div class="flex justify-around items-center h-20 px-4">
            <button onclick="switchTab('wardrobe')" id="btn-wardrobe" class="nav-btn flex flex-col items-center text-gray-400 transition-all">
                <svg class="w-6 h-6 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[10px] font-semibold uppercase tracking-widest">Гардероб</span>
            </button>
            <button onclick="switchTab('outfit')" id="btn-outfit" class="nav-btn flex flex-col items-center text-fashion scale-110 transition-all">
                <svg class="w-6 h-6 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                <span class="text-[10px] font-semibold uppercase tracking-widest">Образ</span>
            </button>
            <button onclick="switchTab('favorites')" id="btn-favorites" class="nav-btn flex flex-col items-center text-gray-400 transition-all">
                <svg class="w-6 h-6 mb-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <span class="text-[10px] font-semibold uppercase tracking-widest">Лайки</span>
            </button>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let lastGeneratedScenario = null;
        let favorites = [];

        const chips = document.querySelectorAll('.scenario-chip');
        const hiddenInput = document.getElementById('scenario');
        const customInputContainer = document.getElementById('custom-input-container');
        const customInputText = document.getElementById('custom-scenario-text');
        const submitBtn = document.getElementById('submit-btn');

        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-fashion', 'text-white', 'active-chip');
                    c.classList.add('bg-white/80', 'text-gray-600');
                });
                chip.classList.remove('bg-white/80', 'text-gray-600');
                chip.classList.add('bg-fashion', 'text-white', 'active-chip');

                const val = chip.dataset.value;

                if (val === 'custom') {
                    customInputContainer.classList.remove('hidden');
                    hiddenInput.value = customInputText.value;
                } else {
                    customInputContainer.classList.add('hidden');
                    hiddenInput.value = val;
                }
                updateButtonText();
            });
        });

        customInputText.addEventListener('input', (e) => {
            if (document.querySelector('.active-chip').dataset.value === 'custom') {
                hiddenInput.value = e.target.value;
                updateButtonText();
            }
        });

        function updateButtonText() {
            if (hiddenInput.value && hiddenInput.value === lastGeneratedScenario) {
                submitBtn.innerText = "Подобрать новый образ";
            } else {
                submitBtn.innerText = "Сгенерировать образ";
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-fashion', 'scale-110');
                el.classList.add('text-gray-400');
            });

            document.getElementById(`tab-${tabName}`).classList.add('active');
            const activeBtn = document.getElementById(`btn-${tabName}`);
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('text-fashion', 'scale-110');

            if(tabName === 'favorites') renderFavorites();
            if(tabName === 'wardrobe') loadMyWardrobe(); 
        }

        async function loadMyWardrobe() {
            const container = document.querySelector('#tab-wardrobe');
            
            try {
                const response = await fetch('/api/my_wardrobe');
                const data = await response.json();
                
                let html = `
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-3xl font-bold tracking-tight mb-2">Мой Гардероб</h2>
                            <p class="text-gray-600 text-sm font-medium">Твои оцифрованные вещи: ${data.length}</p>
                        </div>
                        <button onclick="document.getElementById('native-file-input').click()" class="bg-fashion text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>
                `;

                if (data.length === 0) {
                    html += `
                    <div class="bg-white/60 backdrop-blur rounded-3xl border border-white p-10 flex flex-col items-center justify-center text-center shadow-sm mt-8">
                        <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center text-2xl mb-4">📸</div>
                        <h3 class="font-semibold mb-1" id="wardrobe-title">Гардероб пуст</h3>
                        <p class="text-gray-500 text-sm mb-6" id="wardrobe-desc">Добавь вещи, чтобы ИИ смог с ними работать.</p>
                        <button onclick="document.getElementById('native-file-input').click()" class="bg-white border border-gray-200 text-fashion font-medium text-sm px-6 py-3 rounded-full shadow-sm active:scale-95 transition-all w-full">
                            + Добавить вещь
                        </button>
                    </div>`;
                } else {
                    html += `<div class="grid grid-cols-3 gap-3">`;
                    data.forEach((item, index) => {
                        let imageHtml = '';
                        if (item.image_url) {
                            // Если есть картинка - показываем ее
                            imageHtml = `<img src="${item.image_url}" class="w-full h-full object-cover rounded-2xl">`;
                        } else {
                            // Иначе показываем эмодзи заглушку
                            let icon = '👕';
                            const cat = item.category ? item.category.toLowerCase() : '';
                            if (cat.includes('shoes') || cat.includes('sneakers')) icon = '👟';
                            if (cat.includes('jeans') || cat.includes('trousers') || cat.includes('shorts')) icon = '👖';
                            if (cat.includes('jacket') || cat.includes('coat')) icon = '🧥';
                            imageHtml = `<div class="w-full h-full flex items-center justify-center text-4xl">${icon}</div>`;
                        }

                        html += `
                            <div class="group cursor-pointer animate-fade-up flex flex-col items-center" style="animation-delay: ${index * 0.05}s">
                                <div class="w-full aspect-square bg-white rounded-2xl shadow-sm border border-gray-100 mb-2 relative overflow-hidden">
                                    ${imageHtml}
                                </div>
                                <span class="text-[10px] font-bold text-gray-700 uppercase tracking-tight text-center leading-tight">
                                    ${item.color || ''} <br> ${item.category || 'вещь'}
                                </span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    html += `<div class="mt-6 text-center"><h3 class="font-semibold mb-1" id="wardrobe-title"></h3><p class="text-gray-500 text-sm" id="wardrobe-desc"></p></div>`;
                }

                html += `<input type="file" id="native-file-input" accept="image/*" class="hidden">`;
                container.innerHTML = html;
                
                document.getElementById('native-file-input').addEventListener('change', window.handleUpload);

            } catch (error) {
                console.error("Ошибка загрузки гардероба:", error);
            }
        }

        window.toggleFavorite = function(btn, itemStr) {
            const item = JSON.parse(decodeURIComponent(itemStr));
            const svg = btn.querySelector('svg');

            const index = favorites.findIndex(f => f.id === item.id);
            if (index === -1) {
                favorites.push(item);
                svg.classList.add('text-red-500', 'fill-current');
            } else {
                favorites.splice(index, 1);
                svg.classList.remove('text-red-500', 'fill-current');
            }
            if (document.getElementById('tab-favorites').classList.contains('active')) {
                renderFavorites();
            }
        };

        function renderFavorites() {
            const emptyEl = document.getElementById('favorites-empty');
            const gridEl = document.getElementById('favorites-grid');

            if (favorites.length === 0) {
                emptyEl.classList.remove('hidden');
                gridEl.classList.add('hidden');
                gridEl.innerHTML = '';
            } else {
                emptyEl.classList.add('hidden');
                gridEl.classList.remove('hidden');
                gridEl.innerHTML = '';

                favorites.forEach((item, index) => {
                    const price = item.price ? item.price : '0.00';
                    const card = document.createElement('div');
                    card.className = "group cursor-pointer animate-fade-up";
                    card.style.animationDelay = `${index * 0.05}s`;

                    const itemDataStr = encodeURIComponent(JSON.stringify(item));
                    const imgUrl = item.image_url ? item.image_url : `https://via.placeholder.com/400x500/eeeeee/999999?text=${item.category}`;

                    card.innerHTML = `
                        <div class="relative aspect-[4/5] bg-white rounded-2xl overflow-hidden mb-3 shadow-sm border border-gray-100">
                            <img src="${imgUrl}" class="w-full h-full object-cover">
                            <button onclick="toggleFavorite(this, '${itemDataStr}')" class="absolute top-3 right-3 w-8 h-8 bg-white/90 backdrop-blur rounded-full flex items-center justify-center text-red-500 fill-current shadow-sm transition-transform active:scale-75">
                                <svg class="w-4 h-4 text-red-500 fill-current" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                            </button>
                        </div>
                        <p class="text-sm font-semibold text-fashion leading-tight mb-1 line-clamp-1">${item.title}</p>
                        <p class="text-sm font-bold text-fashion">$${price}</p>
                    `;
                    gridEl.appendChild(card);
                });
            }
        }

        document.getElementById('outfit-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentScenario = hiddenInput.value;
            if (!currentScenario) return;

            const skeleton = document.getElementById('skeleton-loader');
            const resultsContainer = document.getElementById('results-container');

            skeleton.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';

            try {
                const response = await fetch('/api/generate_outfits', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        scenario: currentScenario,
                        style: "Minimal", 
                        count: 1 
                    })
                });

                if (!response.ok) throw new Error('HTTP error ' + response.status);
                const data = await response.json();

                if (data.outfits && data.outfits.length > 0) {
                    const bestOutfit = data.outfits[0];
                    const aiExplanation = bestOutfit.explanation ? bestOutfit.explanation : "Идеальное сочетание для вашего запроса.";
                    
                    let htmlContent = `
                        <div class="mb-4">
                            <h3 class="text-lg font-semibold tracking-tight mb-2">Выбор стилиста</h3>
                            <div class="bg-white/80 backdrop-blur p-4 rounded-xl border border-gray-100 shadow-sm">
                                <p class="text-sm text-gray-700 italic leading-relaxed">«${aiExplanation}»</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-x-4 gap-y-6">
                    `;

                    if (!bestOutfit.items || bestOutfit.items.length === 0) {
                        throw new Error("Нейросеть вернула пустой список вещей (items is empty)");
                    }

                    bestOutfit.items.forEach((item, index) => {
                        if (!item.id) item.id = 'item_' + Math.random().toString(36).substr(2, 9);

                        const isFav = favorites.some(f => f.id === item.id);
                        const heartClass = isFav ? "text-red-500 fill-current" : "text-gray-400";
                        const price = item.price ? item.price : '0.00';
                        const imgUrl = item.image_url ? item.image_url : `https://via.placeholder.com/400x500/eeeeee/999999?text=${item.category || 'clothes'}`;
                        
                        const safeItem = {
                            id: item.id,
                            title: item.title || 'Без названия',
                            category: item.category || 'unknown',
                            price: price,
                            image_url: imgUrl
                        };
                        const itemDataStr = encodeURIComponent(JSON.stringify(safeItem));

                        htmlContent += `
                            <div class="group cursor-pointer animate-fade-up" style="animation-delay: ${index * 0.1}s">
                                <div class="relative aspect-[4/5] bg-white rounded-2xl overflow-hidden mb-3 shadow-sm border border-gray-100">
                                    <img src="${imgUrl}" alt="${safeItem.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://via.placeholder.com/400x500/eeeeee/999999?text=Error'">
                                    <button onclick="toggleFavorite(this, '${itemDataStr}')" class="absolute top-3 right-3 w-8 h-8 bg-white/90 backdrop-blur rounded-full flex items-center justify-center shadow-sm transition-transform active:scale-75 ${heartClass}">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                                    </button>
                                </div>
                                <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">${safeItem.category}</h4>
                                <p class="text-sm font-semibold text-fashion leading-tight mb-1 line-clamp-1">${safeItem.title}</p>
                                <p class="text-sm font-bold text-fashion">$${safeItem.price}</p>
                            </div>
                        `;
                    });

                    htmlContent += `</div>`;
                    resultsContainer.innerHTML = htmlContent;

                    lastGeneratedScenario = currentScenario;
                    updateButtonText();
                    resultsContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                resultsContainer.innerHTML = `<div class="bg-red-50 p-4 rounded-xl border border-red-200">
                    <p class="text-red-600 text-sm font-bold mb-1">Сбой связи со стилистом:</p>
                    <p class="text-red-500 text-xs break-words">${error.message}</p>
                </div>`;
                resultsContainer.classList.remove('hidden');
            } finally {
                skeleton.classList.add('hidden');
            }
        });

        window.handleUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const wardrobeTitle = document.getElementById('wardrobe-title');
            const wardrobeDesc = document.getElementById('wardrobe-desc');
            
            if(wardrobeTitle) wardrobeTitle.innerText = "Идет распознавание...";
            if(wardrobeDesc) wardrobeDesc.innerText = "Модель 5070 Ti анализирует ткань и цвет ⏳";

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload_clothing', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.status === "success") {
                    loadMyWardrobe();
                } else {
                    if(wardrobeTitle) wardrobeTitle.innerText = "Ошибка 😔";
                    if(wardrobeDesc) wardrobeDesc.innerText = data.message;
                }
            } catch (error) {
                console.error("Ошибка при загрузке:", error);
                if(wardrobeTitle) wardrobeTitle.innerText = "Ошибка сети";
                if(wardrobeDesc) wardrobeDesc.innerText = "Не удалось связаться с сервером.";
            } finally {
                e.target.value = '';
            }
        };

        if (document.getElementById('tab-wardrobe').classList.contains('active')) {
            loadMyWardrobe();
        }
    </script>
</body>
</html>
